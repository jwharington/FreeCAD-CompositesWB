  <!-- Secondary fibre orientation line (45 deg, blue) -->
  <line x1="13.6" y1="50.4" x2="50.4" y2="13.6" stroke="#2673e6" stroke-width="2.5"/>
  <polygon points="50.4,13.6 43.6,15.8 46.2,22.4" fill="#2673e6"/>
  <polygon points="13.6,50.4 20.4,48.2 17.8,41.6" fill="#2673e6"/>
